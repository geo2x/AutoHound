<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- ACH Logo - Blood Eclipse -->
  <defs>
    <radialGradient id="eclipseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0392B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#0A0A0A"/>
  
  <!-- Eclipse circle -->
  <circle cx="128" cy="128" r="90" fill="url(#eclipseGlow)" filter="url(#glow)"/>
  
  <!-- Inner shadow -->
  <circle cx="128" cy="128" r="70" fill="none" stroke="#8B0000" stroke-width="2" opacity="0.6"/>
  
  <!-- ACH monogram -->
  <text x="128" y="145" font-family="Arial, sans-serif" font-size="72" font-weight="bold" 
        fill="#B8860B" text-anchor="middle" opacity="0.9">A</text>
  
  <!-- Brand mark - stylized hound -->
  <path d="M 128 90 Q 110 100, 115 115 L 125 125 Q 128 130, 131 125 L 141 115 Q 146 100, 128 90" 
        fill="#E8E8E8" opacity="0.3"/>
</svg>
