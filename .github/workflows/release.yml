name: Release AutoHound

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build CLI with PyInstaller
        run: |
          pyinstaller --onefile --name AutoHound --icon assets/autohound.ico autohound/cli.py

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install installer dependencies
        run: |
          cd installer
          npm ci

      - name: Build Electron installer
        run: |
          cd installer
          npm run build

      - name: List build artifacts
        run: |
          Write-Host "=== CLI Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem dist/ | Format-Table Name, Length
          Write-Host ""
          Write-Host "=== Installer Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem installer/dist/ | Format-Table Name, Length
        shell: pwsh

      - name: Rename installer exe
        run: |
          $installerPath = Get-ChildItem "installer/dist/*.exe" | Select-Object -First 1
          if ($installerPath) {
            $newName = "AutoHound_Setup.exe"
            Move-Item $installerPath.FullName "installer/dist/$newName" -Force
            Write-Host "Renamed to: $newName"
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          name: AutoHound ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## AutoHound ${{ github.ref_name }}

            AI-powered Active Directory attack path analysis by ACH Research Division.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `AutoHound_Setup.exe` | **GUI Installer** — Recommended. Full automatic installation. |
            | `AutoHound.exe` | **CLI Standalone** — For advanced users or existing setups. |

            ### Requirements
            - Windows 10/11
            - Docker Desktop (for BloodHound CE)
            - Python 3.11+
            - Anthropic API key

            ### Quick Start (GUI Installer)
            ```powershell
            # 1. Download AutoHound_Setup.exe
            # 2. Run the installer
            # 3. Follow the wizard to:
            #    - Verify Docker and Python
            #    - Configure API key
            #    - Install AutoHound
            #    - Start BloodHound CE
            # 4. Open http://localhost:8080
            ```

            ### Quick Start (CLI)
            ```powershell
            # Download AutoHound.exe
            # Create .env with: ANTHROPIC_API_KEY=your_key
            .\AutoHound.exe --input bloodhound_data.json --output ./reports
            ```

            ### What You Get
            - Markdown report with attack paths and commands
            - ATT&CK Navigator layer JSON
            - PowerView, Impacket, Rubeus commands

            ---
            **Authorized Environments Only**  
            © 2026 Gordon Prescott — ACH Research Division. All rights reserved.
          files: |
            dist/AutoHound.exe
            installer/dist/AutoHound_Setup.exe
