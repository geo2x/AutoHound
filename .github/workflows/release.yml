name: Release AutoHound

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build CLI with PyInstaller
        run: |
          pyinstaller --onefile --name AutoHound --icon assets/autohound.ico autohound/cli.py

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install installer dependencies
        run: |
          cd installer
          npm ci

      - name: Build Electron installer
        run: |
          cd installer
          npm run build

      - name: List build artifacts
        run: |
          Write-Host "=== CLI Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem dist/ | Format-Table Name, Length
          Write-Host ""
          Write-Host "=== Installer Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem installer/dist/ | Format-Table Name, Length
        shell: pwsh

      - name: Rename installer exe
        run: |
          $installerPath = Get-ChildItem "installer/dist/*.exe" | Select-Object -First 1
          if ($installerPath) {
            $newName = "AutoHound_Setup.exe"
            Move-Item $installerPath.FullName "installer/dist/$newName" -Force
            Write-Host "Renamed to: $newName"
          }
        shell: pwsh

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/AutoHound.exe \
            installer/dist/AutoHound_Setup.exe \
            --title "AutoHound ${{ github.ref_name }}" \
            --latest \
            --notes "## AutoHound ${{ github.ref_name }}

          AI-Powered Active Directory Attack Path Analysis by ACH Research Division.

          ### Downloads
          | File | Description |
          |------|-------------|
          | AutoHound_Setup.exe | Full GUI installer — recommended |
          | AutoHound.exe | CLI standalone |

          ### Requirements
          - Windows 10/11 x64
          - Docker Desktop
          - Anthropic API key (console.anthropic.com)

          ### Quick Start
          1. Run AutoHound_Setup.exe
          2. Enter your Anthropic API key
          3. Open http://localhost:8080

          BloodHound CE default login: username admin, password shown in installer terminal output.

          ---
          © 2026 Gordon Prescott — ACH Research Division. All rights reserved."
