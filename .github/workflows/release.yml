name: Release AutoHound

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build CLI with PyInstaller
        run: |
          pyinstaller --onefile --name AutoHound --icon assets/autohound.ico autohound/cli.py

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install installer dependencies
        run: |
          cd installer
          npm ci

      - name: Build Electron installer
        run: |
          cd installer
          npm run build

      - name: List build artifacts
        run: |
          Write-Host "=== CLI Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem dist/ | Format-Table Name, Length
          Write-Host ""
          Write-Host "=== Installer Artifacts ===" -ForegroundColor Cyan
          Get-ChildItem installer/dist/ | Format-Table Name, Length
        shell: pwsh

      - name: Rename installer exe
        run: |
          $installerPath = Get-ChildItem "installer/dist/*.exe" | Select-Object -First 1
          if ($installerPath) {
            $newName = "AutoHound_Setup.exe"
            Move-Item $installerPath.FullName "installer/dist/$newName" -Force
            Write-Host "Renamed to: $newName"
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          name: AutoHound ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            <div align="center">
              <img src="https://raw.githubusercontent.com/geo2x/AutoHound/main/assets/autohound_small.png" width="120">
              
              # AutoHound ${{ github.ref_name }}
              ### AI-Powered Active Directory Attack Path Analysis
              *by ACH Research Division*
            </div>

            ---

            ## What is AutoHound?

            AutoHound ingests BloodHound CE graph data and uses Claude AI to automatically discover, score, and explain attack paths through your Active Directory environment. It finds what human analysts miss.

            ---

            ## ⬇️ Download

            | File | Description | Use this if... |
            |------|-------------|----------------|
            | **AutoHound_Setup.exe** | Full GUI installer | You are new to AutoHound |
            | **AutoHound.exe** | CLI standalone | You already have BloodHound CE running |

            ---

            ## 🚀 Quick Start (GUI Installer)

            1. Download `AutoHound_Setup.exe`
            2. Run the installer — it handles everything
            3. Enter your [Anthropic API key](https://console.anthropic.com)
            4. Open BloodHound CE at http://localhost:8080
            5. Run SharpHound to collect AD data
            6. Run AutoHound on the output:
            ```bash
            autohound --input ./bloodhound_data/ --output ./reports/
            ```

            ---

            ## 🔧 Requirements

            - Windows 10 or 11 (x64)
            - Docker Desktop
            - Anthropic API key (get one at console.anthropic.com)
            - BloodHound CE (installer sets this up automatically)

            ---

            ## 🔑 BloodHound CE First Login

            After installation BloodHound CE generates a random admin password.
            Check the installer terminal output for your credentials.
            Username is always: `admin`

            ---

            ## ⚠️ Legal

            AutoHound is for authorized security testing only.
            Use only on systems you own or have explicit written permission to test.

            ---

            © 2026 Gordon Prescott — ACH Research Division. All rights reserved.
          files: |
            dist/AutoHound.exe
            installer/dist/AutoHound_Setup.exe
