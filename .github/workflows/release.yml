name: Release AutoHound

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build CLI
        run: |
          pip install pyinstaller
          pip install -e .
          pyinstaller --onefile --name AutoHound --icon assets/autohound.ico autohound/cli.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install installer dependencies
        working-directory: ./installer
        run: npm install

      - name: Build Installer
        working-directory: ./installer
        run: npm run build

      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/AutoHound.exe,installer/dist/AutoHound_Setup.exe"
          name: "AutoHound ${{ github.ref_name }}"
          draft: false
          prerelease: false
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## AutoHound ${{ github.ref_name }}

            AI-Powered Active Directory Attack Path Analysis by ACH Research Division.

            ### Downloads
            | File | Description |
            |------|-------------|
            | AutoHound_Setup.exe | Full GUI installer — recommended |
            | AutoHound.exe | CLI standalone |

            ### Requirements
            - Windows 10/11 x64
            - Docker Desktop
            - Anthropic API key (console.anthropic.com)

            ### Quick Start
            1. Run AutoHound_Setup.exe
            2. Enter your Anthropic API key
            3. Open http://localhost:8080

            BloodHound CE login: username admin, password shown in installer terminal output.

            ---
            © 2026 Gordon Prescott — ACH Research Division. All rights reserved.
